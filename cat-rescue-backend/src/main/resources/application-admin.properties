# 系统管理员环境配置
spring.application.name=cat-rescue-platform-admin

# 服务器配置
server.port=8082
server.servlet.context-path=/

# 数据库配置（共享同一个数据库）
spring.datasource.url=jdbc:mysql://localhost:3306/cat_rescue?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=hh2004919
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# MyBatis Plus配置
mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.type-aliases-package=com.catrescue.catrescueplatform.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt.secret=catrescueplatformsecretkey2024springbootvuejswithmysql
jwt.expiration=86400000

# 允许循环引用
spring.main.allow-circular-references=true

# 安全配置（管理员环境更严格）
spring.security.filter.order=10

# 日志配置（详细的管理员操作日志）
logging.level.com.catrescue.catrescueplatform.controller.AdminController=DEBUG
logging.level.com.catrescue.catrescueplatform.service.AdminService=DEBUG
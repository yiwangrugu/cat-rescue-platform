spring.application.name=cat-rescue-platform

# MySQL数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/cat_rescue?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useSSL=false&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=hh2004919
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# MyBatis Plus配置
mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.type-aliases-package=com.catrescue.catrescueplatform.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
# mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt.secret=catrescueplatformsecretkey2024springbootvuejswithmysql
jwt.expiration=86400000

# 允许循环引用（临时解决方案）
spring.main.allow-circular-references=true

# 服务器配置
server.port=8080
server.servlet.context-path=/

# 数据库初始化配置 - 已禁用，防止数据被意外重置
# spring.datasource.initialization-mode=always
# spring.datasource.data=classpath:data.sql

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 文件存储路径 - 使用绝对路径避免工作目录问题
file.upload-dir=d:/IDEA_project/cat-rescue-platform/cat-rescue-backend/uploads

# DevTools配置 - 禁用可能导致文件被还原的功能
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false